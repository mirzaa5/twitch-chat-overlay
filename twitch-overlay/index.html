<!--
  Twitch Chat Overlay — index.html
  Entry point loaded by OBS Browser Source or a local dev server.
  Expects: config.js (loaded first), settings.js, chat.js, style.css

  OBS SETUP:
  1. In OBS, click + under Sources
  2. Choose "Browser"
  3. Check "Local file" and browse to this index.html
  4. Set Width: 1920, Height: 1080
  5. Check "Shutdown source when not visible"
  6. Check "Refresh browser when scene becomes active"
  7. Click OK

  To position the chat: right-click the source > Transform > Edit Transform
  Or drag the source edges in the preview canvas.

  CUSTOMIZATION: Edit config.js to change defaults, or click the ⚙ gear icon
  in the overlay to open the live settings panel.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0" />
  <title>Twitch Chat Overlay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="chat-container"></div>

  <button id="gear-btn" title="Open settings">
    <svg viewBox="0 0 20 20" fill="currentColor" width="15" height="15">
      <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
    </svg>
  </button>

  <div id="settings-panel"></div>

  <!-- config.js must load before settings.js and chat.js -->
  <script src="config.js"></script>
  <script src="settings.js"></script>
  <script src="chat.js"></script>
</body>
</html>
